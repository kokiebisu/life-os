name: gym-auto

on:
  # schedule disabled (2026-06-04) — manual dispatch only
  # schedule:
  #   # 毎日 JST 03:00 = UTC 18:00（前日）
  #   - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no Notion write, no PR)"
        type: boolean
        default: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      TZ: Asia/Tokyo
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_GYM_DB: ${{ secrets.NOTION_GYM_DB }}
      NOTION_EVENTS_DB: ${{ secrets.NOTION_EVENTS_DB }}
      NOTION_TODO_DB: ${{ secrets.NOTION_TODO_DB }}
      NOTION_MEALS_DB: ${{ secrets.NOTION_MEALS_DB }}
      NOTION_DEVOTION_DB: ${{ secrets.NOTION_DEVOTION_DB }}
      NOTION_STUDY_DB: ${{ secrets.NOTION_STUDY_DB }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "gym-auto[bot]"
          git config user.email "gym-auto@users.noreply.github.com"

      - name: Check disable flag
        id: check_disable
        run: |
          if [ -f .gym-auto.disabled ]; then
            echo "disabled=true" >> $GITHUB_OUTPUT
          else
            echo "disabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare branch
        if: steps.check_disable.outputs.disabled != 'true' && inputs.dry_run != true
        id: branch
        run: |
          BRANCH="chore/gym-auto-$(TZ=Asia/Tokyo date +%Y-%m-%d)"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"

      - name: Run gym-auto (dry-run)
        if: steps.check_disable.outputs.disabled != 'true' && inputs.dry_run == true
        run: bun run scripts/gym/gym-auto.ts --dry-run

      - name: Run gym-auto (production)
        if: steps.check_disable.outputs.disabled != 'true' && inputs.dry_run != true
        run: bun run scripts/gym/gym-auto.ts

      - name: Check for changes
        if: steps.check_disable.outputs.disabled != 'true' && inputs.dry_run != true
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit, push, create and merge PR
        if: steps.check_disable.outputs.disabled != 'true' && inputs.dry_run != true && steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          TODAY=$(TZ=Asia/Tokyo date +%m/%d)

          git add -A
          git commit -m "chore(gym-auto): auto-generate gym session for $TODAY

          Co-Authored-By: Claude Opus 4.7 <noreply@anthropic.com>"
          git push -u origin "$BRANCH"

          PR_URL=$(gh api repos/${{ github.repository }}/pulls \
            --method POST \
            --field title="chore(gym-auto): auto-generate gym session for $TODAY" \
            --field head="$BRANCH" \
            --field base="main" \
            --field body="自動生成されたジムセッションを Notion に登録しました。" \
            --jq '.html_url')

          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/merge \
            --method PUT --field merge_method=squash
